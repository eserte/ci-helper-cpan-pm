name: Test specific CPAN module
run-name: Test ${{ inputs.module }}

on:
  workflow_dispatch:
    inputs:
      module:
        type: string
        required: true
      git-url:
        type: string
        required: false
      include-distroprefs:
        type: boolean
        default: true
      include-sysdeps:
        type: boolean
        default: true
      enable-cpan-reporter:
        type: boolean
        default: false
      distroprefs-branch:
        type: string
        default: master
      sysdeps-branch:
        type: string
        default: master
      test-only:
        type: boolean
        default: false
      debug:
        type: boolean
        default: false

jobs:
  test-module:
    name: on ${{ matrix.container || (matrix.operating_system && format('{0} {1} {2}', matrix.operating_system, matrix.osvers, matrix.architecture)) || matrix.os }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    env:
      INPUTS_MODULE: ${{ inputs.module }}
      INPUTS_GIT_URL: ${{ inputs.git-url }}
      HAS_SYSDEPS_SUPPORT: yes
    defaults:
      run:
        shell: ${{ matrix.operating_system && 'cpa.sh {0}' || 'sh' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'macos-14'
            container: ~
          - os: 'macos-15'
            container: ~
          ## XXX as of 2025-07-13: does not start at all
          #- os: 'macOS-15-arm64'
          #  container: ~
          - os: 'ubuntu-latest'
            container: ubuntu:20.04
          - os: 'ubuntu-22.04'
            container: ~
          - os: 'ubuntu-24.04'
            container: ~
          # another ubuntu as a container, not runner
          - os: 'ubuntu-latest'
            container: ubuntu:24.04
          - os: 'ubuntu-latest'
            container: ubuntu:26.04
          ## XXX as of 2025-07-13: does not start at all
          #- os: 'ubuntu-24.04-arm64'
          #  container: ~
          # fedora: use the minimum and maximum supported versions
          - os: 'ubuntu-latest'
            container: fedora:38
          - os: 'ubuntu-latest'
            container: fedora:43
          - os: 'ubuntu-latest'
            container: rockylinux:9
          #- os: 'ubuntu-latest'
          ## XXX disable until a mirrorlist replacement is found
          #  container: centos:7
          ## XXX needs more work (replacement for checkout action)
          #- os: 'ubuntu-latest'
          #  container: debian:stretch
          - os: 'ubuntu-latest'
            container: debian:buster
          - os: 'ubuntu-latest'
            container: debian:bullseye
          - os: 'ubuntu-latest'
            container: debian:bookworm
          - os: 'ubuntu-latest'
            container: debian:trixie
          - os: 'ubuntu-latest'
            container: debian:forky
          - os: 'ubuntu-latest'
            container: alpine:3.23
          - os: 'ubuntu-24.04'
            operating_system: freebsd
            osvers: '15.0'
            architecture: 'x86-64'
          - os: 'ubuntu-24.04'
            operating_system: freebsd
            osvers: '14.4'
            architecture: 'x86-64'
          - os: 'ubuntu-24.04'
            operating_system: freebsd
            osvers: '13.5'
            architecture: 'x86-64'
          - os: 'ubuntu-24.04'
            operating_system: openbsd
            osvers: '7.9'
            architecture: 'x86-64'
          - os: 'ubuntu-24.04'
            operating_system: netbsd
            osvers: '10.1'
            architecture: 'x86-64'

    steps:
    - name: Current workflow inputs
      run: echo "${{ toJSON(github.event.inputs) }}"
      shell: sh

    - uses: actions/checkout@v3
      with:
        repository: eserte/ci-helper-cpan-pm
        path: ci-helper-cpan-pm
      if: matrix.container == 'centos:7' || matrix.container == 'debian:stretch'
    - uses: actions/checkout@v6
      with:
        repository: eserte/ci-helper-cpan-pm
        path: ci-helper-cpan-pm
      if: matrix.container != 'centos:7' && matrix.container != 'debian:stretch'

    - name: Start VM
      uses: cross-platform-actions/action@v1.2.0
      if: matrix.operating_system
      with:
        operating_system: ${{ matrix.operating_system }}
        version: ${{ matrix.osvers }}
        architecture: ${{ matrix.architecture }}
        environment_variables: CPANARG CPAN_REPORTER_CONFIG GITHUB_WORKSPACE INPUTS_MODULE INPUTS_GIT_URL HAS_SYSDEPS_SUPPORT
        shell: bash

    # Run early because some actions may depend on installing packages
    - name: "Fix sources.list for archived Debian releases"
      run: |
        codename="$(grep VERSION_CODENAME /etc/os-release 2>/dev/null | cut -d= -f2 || true)"
        if [ "$codename" = "buster" ] || [ "$codename" = "stretch" ]; then
          cat > /etc/apt/sources.list <<EOF
        deb http://archive.debian.org/debian $codename main contrib non-free
        deb http://archive.debian.org/debian-security $codename/updates main contrib non-free
        EOF
          rm -f /etc/apt/sources.list.d/*
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
        fi

    - name: "FreeBSD: install basic system prereqs (perl...)"
      if: matrix.operating_system == 'freebsd'
      run: |
          sudo pkg update
          sudo pkg install -y perl5 git

    - name: "OpenBSD: install basic system prereqs (perl...)"
      if: matrix.operating_system == 'openbsd'
      run: |
          sudo pkg_add -u
          sudo pkg_add perl git

    - name: "NetBSD: install basic system prereqs (perl...)"
      if: matrix.operating_system == 'netbsd'
      run: |
          if command -v pkgin >/dev/null 2>&1; then
            sudo pkgin -y update
            sudo pkgin -y install perl git
          else
            sudo pkg_add perl git
          fi
          echo "HAS_SYSDEPS_SUPPORT=no" >> "$GITHUB_ENV"

    - name: "CentOS: install epel"
      run: |
        yum -y install epel-release
      if: "startsWith(matrix.container, 'centos')"

    - name: "Rocky Linux: Clean and update repositories"
      run: |
        dnf clean all
        rm -rf /var/cache/yum
        dnf update -y
      if: "startsWith(matrix.container, 'rockylinux')"

    - name: "Rocky Linux: Enable CRB repository"
      run: |
        dnf install -y dnf-plugins-core
        dnf config-manager --set-enabled crb
      if: "startsWith(matrix.container, 'rockylinux')"

    - name: "rpm-based systems: install perl, CPAN.pm, git..."
      run: |
        dnf -y install "perl(CPAN)" "perl(Test::More)" "perl(Parse::CPAN::Meta)" \
          git make gcc patch glibc-devel
      if: "startsWith(matrix.container, 'fedora') || startsWith(matrix.container, 'centos') || startsWith(matrix.container, 'rockylinux')"

    - name: "apt-based systems: install perl, CPAN.pm, git, make, cc..."
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        extra_pkgs=""
        case "${{ matrix.container }}" in
          debian:forky|ubuntu:26.04)
            extra_pkgs="libcrypt-dev"
            ;;
        esac
        sudocmd=$( [ "$(id -u)" -ne 0 ] && echo "sudo" || echo "" )
        $sudocmd apt-get update -yq && $sudocmd apt-get install -yqq perl git make gcc g++ $extra_pkgs
        echo "DEBIAN_FRONTEND=noninteractive" >> "$GITHUB_ENV"
      if: "(startsWith(matrix.container, 'debian') || startsWith(matrix.container || matrix.os, 'ubuntu')) && !matrix.operating_system"

    - name: "apk-based systems: install perl, CPAN.pm, git..."
      run: |
        apk update -q && apk add -q perl perl-dev perl-utils git build-base wget patch
      if: "startsWith(matrix.container, 'alpine')"

    - name: "perlbrew-based systems: add Perl executable path to GITHUB_PATH"
      run: |
        echo "$(perl -MConfig -e 'print $Config{sitebin}')" >> $GITHUB_PATH
      if: "startsWith(matrix.os, 'macos')"

    - name: apt hacks
      # the already installed libgd3 conflicts with libgd-dev to be installed
      # also, /etc/apt/sources.list should be sufficient; all the other repositories are possibly problematic
      if: "!matrix.operating_system"
      run: |
        if [ -d /etc/apt/sources.list.d ]; then
          echo "Remove additional apt sources..."
          sudocmd=$( [ "$(id -u)" -ne 0 ] && echo "sudo" || echo "" )
          $sudocmd rm -f /etc/apt/sources.list.d/*.list
          $sudocmd apt-get update -qq
          $sudocmd apt-get remove -y libgd3 nginx
        fi

    - name: before build
      run: |
        distroprefs_opts=
        if [ ${{ inputs.include-distroprefs }} = 'true' ]
        then
            distroprefs_opts='--distroprefs=https://github.com/eserte/srezic-cpan-distroprefs --distroprefs-branch=${{ inputs.distroprefs-branch }}'
        fi
        sysdeps_opts=
        if [ ${{ inputs.include-sysdeps }} = 'true' ]
        then
            if [ "$HAS_SYSDEPS_SUPPORT" = "yes" ]
            then
                sysdeps_opts='--enable-sysdeps --sysdeps-branch=${{ inputs.sysdeps-branch }}'
            else
                echo "Turning off sysdeps option. No support for operating system ${{ matrix.operating_system }}"
            fi
        fi
        cpan_reporter_opts=
        if [ ${{ inputs.enable-cpan-reporter }} = 'true' ]
        then
            cpan_reporter_opts='--enable-cpan-reporter --email-from=${{ github.actor }}@users.noreply.github.com'
        fi
        debug_opts=
        if [ ${{ inputs.debug }} = 'true' ]
        then
            debug_opts='--debug'
        fi
        reports_dir_opts=
        if [ "${{ matrix.operating_system }}" != "" ]
        then
            reports_dir_opts="--reports-dir=$HOME/work/var/cpantesters/new"
        fi
        set -ex
        $GITHUB_WORKSPACE/ci-helper-cpan-pm/ci-helper-cpan-pm --no-test $reports_dir_opts $distroprefs_opts $sysdeps_opts $cpan_reporter_opts $debug_opts
    - name: cpan-sysdeps check
      if: "env.HAS_SYSDEPS_SUPPORT != 'no'"
      continue-on-error: true
      run: |
        cpan-sysdeps --cpanmod ${{ inputs.module }}
    - name: cpan-sysdeps dry-run commands
      if: "env.HAS_SYSDEPS_SUPPORT != 'no'"
      continue-on-error: true
      run: |
        cpan-sysdeps --cpanmod ${{ inputs.module }} --dry-run
    - name: maybe git clone repository
      run: |
        $GITHUB_WORKSPACE/ci-helper-cpan-pm/gh-handle-inputs
    - name: ${{ inputs.test-only && 'test' || 'install' }} ${{ inputs.module }}
      run: |
        cpan ${{ inputs.test-only && '-t ' || '' }}$CPANARG
    - name: check ${{ inputs.module }}
      run: |
        $GITHUB_WORKSPACE/ci-helper-cpan-pm/gh-mod-check --test-only=${{ inputs.test-only }} ${{ inputs.module }}
    - name: Prepare artifact name
      if: always() && inputs.enable-cpan-reporter == true
      id: artifact-name
      shell: sh
      run: |
        if [ -n "${{ matrix.container }}" ]; then
          NAME="${{ matrix.container }}"
        elif [ -n "${{ matrix.operating_system }}" ]; then
          NAME="${{ matrix.operating_system }}-${{ matrix.osvers }}-${{ matrix.architecture }}"
        else
          NAME="${{ matrix.os }}"
        fi
        NAME=$(echo "$NAME" | tr ':' '_')
        echo "artifact_name=cpan-test-report-$NAME" >> $GITHUB_OUTPUT

    - name: upload CPAN test reports
      if: always() && inputs.enable-cpan-reporter == true
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact-name.outputs.artifact_name }}
        path: ${{ matrix.operating_system && '~/work/var/cpantesters/new/*.rpt' || '~/var/cpantesters/new/*.rpt' }}

  test-module-windows:
    name: on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      INPUTS_MODULE: ${{ inputs.module }}
      INPUTS_GIT_URL: ${{ inputs.git-url }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'windows-2022'
          - os: 'windows-2025'
    steps:
    - name: Current workflow inputs
      run: echo "${{ toJSON(github.event.inputs) }}"
    - uses: actions/checkout@v6
      with:
        repository: eserte/ci-helper-cpan-pm
        path: ci-helper-cpan-pm
    - name: before build
      run: |
        $distroprefs_opts = ""
        if ("${{ inputs.include-distroprefs }}" -eq "true") {
            $distroprefs_opts = "--distroprefs=https://github.com/eserte/srezic-cpan-distroprefs --distroprefs-branch=${{ inputs.distroprefs-branch }}"
        }
        $sysdeps_opts = ""
        if ("${{ inputs.include-sysdeps }}" -eq "true") {
            $sysdeps_opts = "--enable-sysdeps --sysdeps-branch=${{ inputs.sysdeps-branch }}"
        }
        $cpan_reporter_opts = ""
        if ("${{ inputs.enable-cpan-reporter }}" -eq "true") {
            $cpan_reporter_opts = "--enable-cpan-reporter --email-from=${{ github.actor }}@users.noreply.github.com"
        }
        $debug_opts = ""
        if ("${{ inputs.debug }}" -eq "true") {
            $debug_opts = "--debug"
        }
        $ci_helper_cmd = "perl $env:GITHUB_WORKSPACE\ci-helper-cpan-pm\ci-helper-cpan-pm --no-test $distroprefs_opts $sysdeps_opts $cpan_reporter_opts $debug_opts"
        Write-Host $ci_helper_cmd
        Invoke-Expression $ci_helper_cmd
    - name: prepend Strawberry Perl to PATH
      run: |
        echo "C:\Strawberry\c\bin;C:\Strawberry\perl\site\bin;C:\Strawberry\perl\bin;$env:PATH" > $env:GITHUB_PATH
      shell: powershell
    - name: cpan-sysdeps check
      continue-on-error: true
      run: |
        cpan-sysdeps --cpanmod ${{ inputs.module }}
    - name: cpan-sysdeps dry-run commands
      continue-on-error: true
      run: |
        cpan-sysdeps --cpanmod ${{ inputs.module }} --dry-run
    - name: maybe git clone repository
      run: |
        perl "$env:GITHUB_WORKSPACE\ci-helper-cpan-pm\gh-handle-inputs"
    - name: ${{ inputs.test-only && 'test' || 'install' }} ${{ inputs.module }}
      run: |
        cpan ${{ inputs.test-only && '-t ' || '' }}$env:CPANARG
    - name: check ${{ inputs.module }}
      run: |
        $check_cmd = "perl $env:GITHUB_WORKSPACE\ci-helper-cpan-pm\gh-mod-check --test-only=${{ inputs.test-only }} ${{ inputs.module }}"
        Write-Host $check_cmd
        Invoke-Expression $check_cmd
    - name: Prepare artifact path
      if: always() && inputs.enable-cpan-reporter == true
      id: artifact-path
      run: |
        echo "userprofile=$env:USERPROFILE" >> $env:GITHUB_OUTPUT
    - name: upload CPAN test reports
      if: always() && inputs.enable-cpan-reporter == true
      uses: actions/upload-artifact@v7
      with:
        name: cpan-test-report-${{ matrix.os }}
        path: ${{ steps.artifact-path.outputs.userprofile }}\\var\\cpantesters\\new\\*.rpt

